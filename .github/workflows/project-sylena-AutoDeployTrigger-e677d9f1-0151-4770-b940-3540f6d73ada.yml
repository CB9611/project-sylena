name: Trigger auto deployment for project-sylena

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/project-sylena-AutoDeployTrigger-e677d9f1-0151-4770-b940-3540f6d73ada.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PROJECTSYLENA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PROJECTSYLENA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PROJECTSYLENA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: sylenaregistry.azurecr.io
          registryUsername: ${{ secrets.PROJECTSYLENA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PROJECTSYLENA_REGISTRY_PASSWORD }}
          containerAppName: project-sylena
          resourceGroup: project-sylena-rg
          imageToBuild: sylenaregistry.azurecr.io/project-sylena:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


